# .github/workflows/_build.yml
# Reusable workflow: builds the SSR client by calling the build-client composite.
# Triggered only by workflow_call, so CI (and any future deploy) share one build path.

name: Build (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use for the build.
        required: false
        default: '24.18'
        type: string
      artifact-name:
        description: Name of the uploaded artifact.
        required: false
        default: dist
        type: string
    outputs:
      artifact-name:
        description: Name of the artifact produced by the build job.
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.echo.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build client
        uses: ./.github/actions/build-client
        with:
          node-version: ${{ inputs.node-version }}
          artifact-name: ${{ inputs.artifact-name }}

      - name: Echo artifact name
        id: echo
        run: echo "name=${{ inputs.artifact-name }}" >> "$GITHUB_OUTPUT"
