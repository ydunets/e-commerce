# .github/workflows/ci.yml
# PR validation. Builds the client artifact and validates the whole workspace.
# Does not deploy.

name: CI

on:
  pull_request:
    branches: [main]
    # Skip when only docs/markdown change (nothing to build or validate).
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  # Produce the deployable client build artifact.
  build:
    uses: ./.github/workflows/_build.yml

  # Validate every package concurrently: client (Biome + tsc + rstest),
  # server (Biome + tsc + unit tests), storybook (build). No DB required.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Check
        run: pnpm check
