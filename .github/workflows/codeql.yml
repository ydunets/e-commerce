# .github/workflows/codeql.yml
# Weekly scheduled CodeQL scan. Per-PR CodeQL runs inside pr-checks.yml and
# per-push runs inside release-deploy.yml; all three share the reusable _codeql.yml.

name: CodeQL (scheduled)

on:
  schedule:
    - cron: '31 3 * * 1' # Mondays at 03:31 UTC

jobs:
  analyze:
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    uses: ./.github/workflows/_codeql.yml
