# .github/workflows/codeql.yml
# CodeQL static analysis for the whole monorepo (JavaScript/TypeScript).
# Runs on PRs, on pushes to main, and weekly. No build step needed.

name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  schedule:
    - cron: '31 3 * * 1' # Mondays at 03:31 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript is one CodeQL language covering both.
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
