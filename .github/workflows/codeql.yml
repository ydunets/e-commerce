# .github/workflows/codeql.yml
# Weekly scheduled CodeQL scan. Per-PR and per-push CodeQL runs inside the
# pipeline (pipeline.yml -> security job); both share the reusable _codeql.yml.

name: CodeQL (scheduled)

on:
  schedule:
    - cron: '31 3 * * 1' # Mondays at 03:31 UTC

jobs:
  analyze:
    uses: ./.github/workflows/_codeql.yml
