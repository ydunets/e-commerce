# .github/workflows/deploy.yml
# After images are published to GHCR on main, roll both Azure Container Apps to
# the new images. Authenticates to Azure with OIDC (no long-lived secrets).
#
# Requires (see docs/deploy-azure.md):
#   secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   vars:    AZURE_RESOURCE_GROUP, AZURE_SERVER_APP, AZURE_CLIENT_APP

name: Deploy

on:
  # Run only after the image build succeeds on main, so the images exist.
  workflow_run:
    workflows: ['Docker images']
    types: [completed]
    branches: [main]
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write # fetch the OIDC token for azure/login
  contents: read

jobs:
  deploy:
    # Deploy on a successful image build, or when triggered manually.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Server first: the client proxies /api to it.
      - name: Deploy server
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_SERVER_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/server:latest

      - name: Deploy client
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_CLIENT_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/client:latest
