# .github/workflows/docker-server.yml
# Build the server image on PRs (verify only) and build + push to GHCR on main.

name: Docker (server)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docker-server.yml'
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docker-server.yml'

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in when we intend to push (never on pull_request, incl. forks).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          # Push only on main; PRs build to verify the Dockerfile without publishing.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
