# .github/workflows/pr-checks.yml
# Runs on every PR to main: lint/types/tests, CodeQL, and a build-only check
# of the Docker images (no push). Nothing here touches GHCR, releases, or
# Azure; see release-deploy.yml for what runs after a merge to main.

name: PR Checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

# One run per PR; a new push cancels the previous run.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 1. Lint + types + unit tests across the whole workspace.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Check
        run: pnpm check

  # 2. CodeQL security scan (runs in parallel with validate).
  security:
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    uses: ./.github/workflows/_codeql.yml

  # 3. Build the client, server, and migrations images to verify the
  #    Dockerfiles. No registry login, so this is safe to run for forks too.
  build:
    needs: [validate, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # The migrations image builds from its own directory: the root
        # .dockerignore excludes apps/server/db from the root context.
        include:
          - app: client
            dockerfile: apps/client/Dockerfile
            context: .
          - app: server
            dockerfile: apps/server/Dockerfile
            context: .
          - app: migrations
            dockerfile: apps/server/db/Dockerfile
            context: apps/server/db
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
