# .github/workflows/release-deploy.yml
# Runs after a merge to main (or manual dispatch): re-validates, then builds +
# pushes the images, cuts a release, and deploys to Azure. Nothing here runs
# on a PR; see pr-checks.yml for what gates a merge.
#
#   validate ─┐
#             ├─▶ build ─▶ release ─▶ deploy (DB migrate, then roll images)
#   security ─┘
#
# Nothing deploys unless tests, security, and the image build all pass first.

name: Release & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  # Manual full run to prod (rebuild + push + release + deploy).
  workflow_dispatch:

# One run per ref; never cancel a run mid-deploy.
concurrency:
  group: release-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # 1. Lint + types + unit tests across the whole workspace.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Check
        run: pnpm check

  # 2. CodeQL security scan (runs in parallel with validate).
  security:
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    uses: ./.github/workflows/_codeql.yml

  # 3. Build and push the client, server, and migrations images to GHCR.
  #    Gated on both tests and security passing.
  build:
    needs: [validate, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    strategy:
      fail-fast: false
      matrix:
        # The migrations image builds from its own directory: the root
        # .dockerignore excludes apps/server/db from the root context.
        include:
          - app: client
            dockerfile: apps/client/Dockerfile
            context: .
          - app: server
            dockerfile: apps/server/Dockerfile
            context: .
          - app: migrations
            dockerfile: apps/server/db/Dockerfile
            context: apps/server/db
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Cut a versioned GitHub Release from conventional commits.
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the CHANGELOG/tag commit + create the release
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: pnpm --filter @e-commerce/server semantic-release

  # 5. Apply DB migrations, then roll both Azure Container Apps to the
  #    freshly pushed images. Schema lands before the code that needs it.
  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC token for azure/login
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Migrations run inside Azure as a Container Apps Job: point the job at
      # this commit's image (immutable sha tag, same commit the build stage
      # pushed) and run it to completion. The DB password never leaves Azure
      # and no firewall changes are needed. A failure here fails this step and
      # therefore blocks the image rollout below. dbmate tracks applied files
      # in schema_migrations, so re-runs are no-ops.
      # Poll ceiling (90 x 15s) deliberately exceeds the job's worst case of
      # replica-timeout 600s x (1 + retry limit 1).
      - name: Run migrations via Container Apps Job
        run: |
          az containerapp job update \
            --name ecommerce-db-migrate \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ghcr.io/${{ github.repository }}/migrations:sha-${GITHUB_SHA::7} \
            --output none
          EXEC=$(az containerapp job start \
            --name ecommerce-db-migrate \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Started job execution: $EXEC"
          for i in $(seq 1 90); do
            sleep 15
            STATUS=$(az containerapp job execution show \
              --name ecommerce-db-migrate \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --job-execution-name "$EXEC" \
              --query properties.status -o tsv)
            echo "[poll $i] $STATUS"
            case "$STATUS" in
              Succeeded) exit 0 ;;
              Failed|Stopped)
                echo "::error::Migration job execution $EXEC ended as $STATUS." \
                  "Logs: Container Apps > ecommerce-db-migrate > Execution history." >&2
                exit 1 ;;
            esac
          done
          echo "::error::Migration job execution $EXEC still $STATUS after poll ceiling" >&2
          exit 1
      # Server first: the client proxies /api to it.
      - name: Deploy server
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_SERVER_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/server:latest
      - name: Deploy client
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_CLIENT_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/client:latest
