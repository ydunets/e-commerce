# .github/workflows/release-deploy.yml
# Runs after a merge to main (or manual dispatch): re-validates, then builds +
# pushes the images, cuts a release, and deploys to Azure. Nothing here runs
# on a PR; see pr-checks.yml for what gates a merge.
#
#   validate ─┐
#             ├─▶ build ─▶ release ─▶ deploy (DB migrate, then roll images)
#   security ─┘
#
# Nothing deploys unless tests, security, and the image build all pass first.

name: Release & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  # Manual full run to prod (rebuild + push + release + deploy).
  workflow_dispatch:

# One run per ref; never cancel a run mid-deploy.
concurrency:
  group: release-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # 1. Lint + types + unit tests across the whole workspace.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Check
        run: pnpm check

  # 2. CodeQL security scan (runs in parallel with validate).
  security:
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    uses: ./.github/workflows/_codeql.yml

  # 3. Build and push the client, server, and migrations images to GHCR.
  #    Gated on both tests and security passing.
  build:
    needs: [validate, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    strategy:
      fail-fast: false
      matrix:
        # The migrations image builds from its own directory: the root
        # .dockerignore excludes apps/server/db from the root context.
        include:
          - app: client
            dockerfile: apps/client/Dockerfile
            context: .
          - app: server
            dockerfile: apps/server/Dockerfile
            context: .
          - app: migrations
            dockerfile: apps/server/db/Dockerfile
            context: apps/server/db
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Cut a versioned GitHub Release from conventional commits.
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the CHANGELOG/tag commit + create the release
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: pnpm --filter @e-commerce/server semantic-release

  # 5. Apply DB migrations, then roll both Azure Container Apps to the
  #    freshly pushed images. Schema lands before the code that needs it.
  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC token for azure/login
      contents: read
    env:
      FW_RULE: gh-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Shadow run of the job-based migration path: point the Container Apps
      # Job at this commit's image (immutable sha tag, same commit the build
      # stage pushed) and run it to completion inside Azure. Still
      # continue-on-error: the runner-based step below remains authoritative
      # until this path has proven itself on a real deploy.
      # Poll ceiling (90 x 15s) deliberately exceeds the job's worst case of
      # replica-timeout 600s x (1 + retry limit 1).
      - name: Run migrations via Container Apps Job (shadow)
        continue-on-error: true
        run: |
          az containerapp job update \
            --name ecommerce-db-migrate \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ghcr.io/${{ github.repository }}/migrations:sha-${GITHUB_SHA::7} \
            --output none
          EXEC=$(az containerapp job start \
            --name ecommerce-db-migrate \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Started job execution: $EXEC"
          for i in $(seq 1 90); do
            sleep 15
            STATUS=$(az containerapp job execution show \
              --name ecommerce-db-migrate \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --job-execution-name "$EXEC" \
              --query properties.status -o tsv)
            echo "[poll $i] $STATUS"
            case "$STATUS" in
              Succeeded) exit 0 ;;
              Failed|Stopped)
                echo "::error::Migration job execution $EXEC ended as $STATUS." \
                  "Logs: Container Apps > ecommerce-db-migrate > Execution history." >&2
                exit 1 ;;
            esac
          done
          echo "::error::Migration job execution $EXEC still $STATUS after poll ceiling" >&2
          exit 1
      # The DB only allows known IPs; open a hole for this runner, closed
      # again below. Connection details come from the server app's own env,
      # so there is no second copy of them to keep in sync.
      - name: Open DB firewall for this runner
        run: |
          PG_HOST_PORT=$(az containerapp show \
            --name ${{ vars.AZURE_SERVER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='POSTGRES_URL'].value | [0]" -o tsv)
          echo "PG_HOST_PORT=$PG_HOST_PORT" >> "$GITHUB_ENV"
          echo "PG_SERVER=${PG_HOST_PORT%%.*}" >> "$GITHUB_ENV"
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "${PG_HOST_PORT%%.*}" \
            --rule-name "$FW_RULE" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
      # dbmate tracks applied files in schema_migrations, so this is a no-op
      # when nothing is pending and safe to run on every deploy.
      - name: Run DB migrations and seeds
        env:
          DBMATE_NO_DUMP_SCHEMA: 'true'
        run: |
          PG_USER=$(az containerapp show \
            --name ${{ vars.AZURE_SERVER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='POSTGRES_USER'].value | [0]" -o tsv)
          PG_DB=$(az containerapp show \
            --name ${{ vars.AZURE_SERVER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='POSTGRES_DB'].value | [0]" -o tsv)
          PG_PASS=$(az containerapp secret show \
            --name ${{ vars.AZURE_SERVER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --secret-name pg-password --query value -o tsv)
          echo "::add-mask::$PG_PASS"
          export DBMATE_DATABASE_URL="postgres://$PG_USER:$PG_PASS@$PG_HOST_PORT/$PG_DB?sslmode=require"
          pnpm --filter @e-commerce/server db:migrate
          pnpm --filter @e-commerce/server db:seed
      - name: Close DB firewall
        if: always() && env.PG_SERVER != ''
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$PG_SERVER" \
            --rule-name "$FW_RULE" --yes
      # Server first: the client proxies /api to it.
      - name: Deploy server
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_SERVER_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/server:latest
      - name: Deploy client
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_CLIENT_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/client:latest
