# .github/workflows/release.yml
# On push to main: validate the workspace, then cut a GitHub Release + tag +
# CHANGELOG from conventional commits via semantic-release. No npm publish.

name: Release

on:
  push:
    branches: [main]

# Only one release at a time; never cancel a release mid-run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the release, push the CHANGELOG/tag commit
  issues: write # comment on released issues
  pull-requests: write # comment on released PRs

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - name: Setup workspace
        uses: ./.github/actions/setup

      # Light pre-release gate: lint + types + unit tests across the workspace.
      - name: Check
        run: pnpm check

      # semantic-release toolchain is a devDependency of @e-commerce/server and
      # reads apps/server/.releaserc. GITHUB_TOKEN is enough (no npm publish).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: pnpm --filter @e-commerce/server semantic-release
